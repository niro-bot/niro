<!DOCTYPE html><html><body style="background:#0f0f0f;color:#fff;font-family:sans-serif;padding:20px"><h1>🗣️ Arabic → Nederlands</h1><p>Spreek Arabisch</p><button onclick="start()" id="btn" style="background:#00d4aa;color:#000;padding:15px 30px;font-size:20px;border-radius:50px;border:none">🎤 Start</button><div style="margin-top:20px"><div style="background:#1a1a1a;padding:15px;border-radius:10px;margin:10px 0"><h3>Arabisch</h3><div id="ar" style="font-size:24px;direction:rtl"></div></div><div style="background:#1a1a1a;padding:15px;border-radius:10px"><h3>Nederlands</h3><div id="nl" style="font-size:20px">(vereist vertaling API)</div></div></div><script>const r=new webkitSpeechRecognition();r.lang="ar-SA";r.onstart=()=>{document.getElementById("btn").textContent="⏹️ Stop";document.getElementById("ar").textContent="";};r.onresult=e=>{for(let i=e.resultIndex;i<e.results.length;i++)if(e.results[i].isFinal)document.getElementById("ar").textContent+=e.results[i][0].transcript;};document.getElementById("btn").onclick=()=>r.running?r.stop():r.start();</script></body></html>
